<p class="p-3"
 [ngClass]="{
  'bg-success text-white' : isAvailable,
  'bg-danger' : ! isAvailable
 }">
  
    This is product {{PRODUCT_NAME}} and its Id is {{PRODUCT_ID}}
    <strong *ngIf="isAvailable"; else onProduct>
      and the product is available
    </strong>
    <ng-template #onProduct>
     <strong>and the product is not available</strong>
    </ng-template>  
</p>
<br>
